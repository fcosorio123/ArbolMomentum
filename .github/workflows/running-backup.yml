# Mirrors main → running-backup after every safe push.
# Restore: git checkout running-backup  OR  git reset --hard origin/running-backup

name: ArbolMomentum Running Backup

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: running-backup
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.event.head_commit != null && !startsWith(github.event.head_commit.message, 'Revert')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main to running-backup
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git branch -f running-backup HEAD
          git push origin running-backup --force-with-lease

      - name: Summary
        run: |
          echo "running-backup now matches main at ${{ github.sha }}"
          echo "Restore anytime: git fetch origin && git checkout running-backup"
