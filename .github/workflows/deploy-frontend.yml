name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify protected paths
        run: node scripts/verify-protected-paths.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /ArbolMomentum/
          VITE_PUBLISHED: 'true'

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false

  figma-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify protected paths
        run: node scripts/verify-protected-paths.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Figma Make (root base path + redirect)
        run: npm run build:figma
        env:
          VITE_BASE_PATH: /
          VITE_PUBLISHED: 'true'

      - name: Upload Figma publish bundle
        uses: actions/upload-artifact@v4
        with:
          name: figma-publish-bundle
          path: dist/
          retention-days: 30
