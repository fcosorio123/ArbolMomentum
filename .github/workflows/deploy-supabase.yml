name: Deploy Supabase Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/server/**'
      - '.github/workflows/deploy-supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Link edge function folder
        run: ln -s server supabase/functions/make-server-5d90ddf5
        working-directory: supabase/functions

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            EMAIL_FROM_ADDRESS="${{ secrets.EMAIL_FROM_ADDRESS }}" \
            EMAIL_FROM_NAME="${{ secrets.EMAIL_FROM_NAME }}" \
            APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
            --project-ref lhbvzojmtvjeauqnnmdu

      - name: Deploy make-server-5d90ddf5
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy make-server-5d90ddf5 --project-ref lhbvzojmtvjeauqnnmdu
